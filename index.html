<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Select Experience - VSMOV / NHENTAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --manga-color: #ED2553;
            --manga-bg: #1B1525;
            --movie-color: #E2C275;
            --movie-bg: #06080F;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: #000; }
        
        .split-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Mobile overrides to flex-direction column */
        @media (max-width: 768px) {
            .split-container { flex-direction: column; }
            .split-panel { width: 100% !important; height: 50vh !important; }
        }

        .split-panel {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }

        /* Desktop hover expansion */
        @media (min-width: 769px) {
            .split-panel:hover {
                flex: 1.5;
            }
            .split-panel:hover .panel-content {
                transform: scale(1.1);
            }
        }
        /* Mobile active expansion */
        @media (max-width: 768px) {
            .split-panel:active {
                flex: 1.2 !important;
            }
        }

        .manga-panel {
            background: linear-gradient(135deg, var(--manga-bg), #3a1829);
            color: white;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .movie-panel {
            background: linear-gradient(135deg, var(--movie-bg), #1a1b26);
            color: white;
        }

        .panel-bg-overlay {
            position: absolute;
            inset: 0;
            opacity: 0.3;
            background-size: cover;
            background-position: center;
            transition: var(--transition);
            z-index: 1;
        }

        .manga-panel .panel-bg-overlay {
            background-image: url('https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=1000&auto=format&fit=crop');
        }

        .movie-panel .panel-bg-overlay {
            background-image: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1000&auto=format&fit=crop');
        }

        .split-panel:hover .panel-bg-overlay {
            opacity: 0.6;
            transform: scale(1.05);
        }

        .panel-content {
            position: relative;
            z-index: 10;
            text-align: center;
            transition: var(--transition);
        }

        .panel-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }

        .manga-panel .panel-icon { color: var(--manga-color); }
        .movie-panel .panel-icon { color: var(--movie-color); }

        .panel-title {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .panel-desc {
            font-size: 1.1rem;
            opacity: 0.8;
            font-weight: 400;
            max-width: 300px;
            margin: 0 auto;
        }

        .enter-btn {
            margin-top: 30px;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
        }

        .manga-panel .enter-btn {
            background: var(--manga-color);
            color: white;
            border: none;
            box-shadow: 0 10px 20px rgba(237, 37, 83, 0.3);
        }

        .movie-panel .enter-btn {
            background: var(--movie-color);
            color: #000;
            border: none;
            box-shadow: 0 10px 20px rgba(226, 194, 117, 0.3);
        }

        .split-panel:hover .enter-btn {
            opacity: 1;
            transform: translateY(0);
        }
        
        @media (max-width: 768px) {
            .enter-btn {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="split-container">
        <!-- Manga Selection -->
        <a href="./manga/index.html" class="split-panel manga-panel">
            <div class="panel-bg-overlay"></div>
            <div class="panel-content">
                <span class="panel-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                </span>
                <h1 class="panel-title">Manga</h1>
                <p class="panel-desc">Khám phá thế giới Doujinshi & Manga đồ sộ.</p>
                <div class="enter-btn">Khám phá</div>
            </div>
        </a>

        <!-- Movie Selection -->
        <a href="./movie/index.html" class="split-panel movie-panel">
            <div class="panel-bg-overlay"></div>
            <div class="panel-content">
                <span class="panel-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 3 19 12 5 21 5 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                <h1 class="panel-title">Movies</h1>
                <p class="panel-desc">Trải nghiệm điện ảnh đỉnh cao chuẩn Pro Max.</p>
                <div class="enter-btn">Xem Phim</div>
            </div>
        </a>
    </div>
</body>
</html>
