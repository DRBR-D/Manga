<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>nHentai Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ═══ TOP NAV ═══ -->
  <header class="top-nav">
    <div class="top-nav-inner">
      <button class="nav-brand" id="brand-logo" aria-label="Trang chủ">
        <span class="nav-brand-icon">nH</span>
        <span class="nav-brand-text">nHentai</span>
      </button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <form class="search-field" id="search-form" role="search">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Tìm kiếm" autocomplete="off" enterkeyhint="search">
        <select id="sort-select">
          <option value="recent">Mới nhất</option>
          <option value="popular">Phổ biến</option>
          <option value="popular-week">Hot tuần</option>
          <option value="popular-today">Hot hôm nay</option>
        </select>
      </form>
    </div>

    <!-- Nav row -->
    <div class="nav-row">
      <button class="nav-btn active" id="nav-home">Trang Chủ</button>
      <button class="nav-btn" id="nav-popular">Hot</button>
      <button class="nav-btn accent" id="nav-random-top">Ngẫu Nhiên</button>
      <button class="nav-btn" id="nav-favs">Yêu Thích</button>
      <button class="nav-btn" id="nav-history">Lịch Sử</button>
    </div>

    <!-- ID Jumper -->
    <div class="jumper-row">
      <input type="number" id="jump-id-input" placeholder="Nhập ID gallery..." min="1">
      <button id="jump-id-btn" class="btn btn-pri" style="font-size:.8125rem;padding:5px 14px;min-height:32px;">Đến</button>
    </div>
  </header>

  <!-- ═══ CONTENT ═══ -->
  <main class="app-content">

    <!-- ── LISTING ── -->
    <section id="view-listing" class="view-section active">

      <div id="popular-banner" class="hidden">
        <div class="sec-hdr"><h2 class="sec-title">Phổ Biến</h2></div>
        <div id="popular-grid" class="pop-scroll"></div>
      </div>

      <div class="sec-hdr">
        <h2 id="listing-title" class="sec-title">Mới Nhất</h2>
      </div>

      <div id="gallery-grid" class="gallery-grid"></div>
      <div id="listing-loader" class="loader hidden">
        <div class="spinner"></div>
        <p>Đang tải...</p>
      </div>

      <div id="pagination" class="pagination">
        <button id="pg-prev" class="btn btn-sec" style="font-size:.8125rem;">Trước</button>
        <span class="pg-info">Trang <input type="number" id="pg-input" min="1" value="1"> / <span id="pg-max">1</span></span>
        <button id="pg-next" class="btn btn-sec" style="font-size:.8125rem;">Sau</button>
      </div>
    </section>

    <!-- ── DETAILS ── -->
    <section id="view-details" class="view-section">
      <button class="btn-back" id="details-back-btn" style="margin:6px 12px;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Quay lại
      </button>

      <div class="detail-card">
        <div class="detail-cover">
          <img id="details-cover" src="" alt="Cover" referrerpolicy="no-referrer">
        </div>
        <div class="detail-info">
          <h1 id="details-title-pretty" class="detail-title">Title</h1>
          <h3 id="details-title-english" class="detail-sub">English</h3>
          <h4 id="details-title-japanese" class="detail-jp">Japanese</h4>
          <div class="detail-stats">
            <span class="stat">Trang <strong id="details-pages-count">0</strong></span>
            <span class="stat">Thích <strong id="details-favs-count">0</strong></span>
            <span class="stat" id="details-upload-date">N/A</span>
            <span class="stat">#<strong id="details-id">0</strong></span>
          </div>
          <div class="detail-actions">
            <button id="btn-start-reading" class="btn btn-pri btn-lg">Đọc Ngay</button>
            <button id="btn-toggle-fav" class="btn btn-sec">Yêu Thích</button>
          </div>
        </div>
      </div>

      <div id="details-tags-list" style="display:flex;flex-direction:column;gap:6px;padding:4px 0;"></div>

      <div class="divider"></div>

      <div class="sec-hdr"><h3 class="sec-title" style="font-size:1.125rem;">Trang (<span id="thumb-count">0</span>)</h3></div>
      <div id="pages-thumb-grid" class="thumb-grid"></div>

      <div class="divider"></div>

      <div class="sec-hdr"><h3 class="sec-title" style="font-size:1.125rem;">Liên Quan</h3></div>
      <div id="related-grid" class="related-grid"></div>
    </section>

    <!-- ── READER ── -->
    <section id="view-reader" class="view-section">
      <header class="reader-top">
        <button id="reader-close-btn" class="btn btn-ghost" style="color:var(--txt);" aria-label="Thoát">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <div class="reader-top-center">
          <div class="reader-top-title" id="reader-book-title">Title</div>
        </div>
        <button class="btn btn-ghost" style="color:var(--txt);" aria-label="Toàn màn hình" onclick="document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
      </header>

      <!-- Single Page -->
      <div id="single-reader-container" class="reader-stage">
        <div class="reader-img-wrap">
          <img id="reader-current-img" src="" alt="" class="reader-main-img fit-height" referrerpolicy="no-referrer">
          <div id="reader-img-loader" class="loader hidden" style="position:absolute;padding:0;">
            <div class="spinner"></div>
          </div>
        </div>
        <div class="reader-touch-l" id="zone-prev"></div>
        <div class="reader-touch-r" id="zone-next"></div>
      </div>

      <!-- Continuous Scroll -->
      <div id="continuous-reader-container" class="reader-scroll hidden">
        <div id="continuous-pages-list" class="reader-scroll-inner"></div>
      </div>

      <!-- Bottom Bar -->
      <div class="reader-bot" id="reader-page-nav">
        <button id="btn-prev-page" class="btn btn-sec" style="font-size:.8125rem;">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Trước
        </button>

        <select id="reader-mode-select" style="background:var(--fill2);color:var(--txt);border:none;padding:6px 10px;border-radius:8px;font-size:.8125rem;outline:none;">
          <option value="single">Từng trang</option>
          <option value="continuous">Cuộn</option>
        </select>

        <span style="display:flex;align-items:center;gap:4px;font-size:.8125rem;color:var(--txt2);">
          <input type="number" id="reader-page-input" min="1" value="1" style="width:40px;background:var(--fill2);border:.5px solid var(--sep);color:var(--txt);text-align:center;padding:4px 2px;border-radius:7px;font-size:.8125rem;font-weight:500;"> / <span id="reader-total-pages">1</span>
        </span>

        <button id="btn-next-page" class="btn btn-sec" style="font-size:.8125rem;">
          Sau
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </section>

  </main>

  <!-- ═══ BOTTOM TAB BAR ═══ -->
  <nav class="tab-bar" role="tablist">
    <button class="tab-item active" data-nav="nav-home">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Trang Chủ</span>
    </button>
    <button class="tab-item" data-nav="nav-popular">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <span>Hot</span>
    </button>
    <button class="tab-item" data-nav="nav-favs">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>Yêu Thích</span>
      <span class="tab-badge hidden" id="fav-count-badge">0</span>
    </button>
    <button class="tab-item" data-nav="nav-history">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span>Lịch Sử</span>
    </button>
  </nav>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Tab bar click handler -->
  <script>
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const navId = tab.dataset.nav;
        if (navId) {
          const navBtn = document.getElementById(navId);
          if (navBtn) navBtn.click();
        }
      });
    });
    // Sync top nav active state
    const observer = new MutationObserver(() => {
      const activeTop = document.querySelector('.nav-btn.active');
      document.querySelectorAll('.tab-item').forEach(t => {
        const navId = t.dataset.nav;
        t.classList.toggle('active', navId && activeTop && activeTop.id === navId);
      });
    });
    document.querySelectorAll('.nav-btn').forEach(b => {
      observer.observe(b, { attributes: true, attributeFilter: ['class'] });
    });
  </script>

  <script src="app.js"></script>
</body>
</html>
